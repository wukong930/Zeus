services:
  postgres:
    image: pgvector/pgvector:pg16
    container_name: zeus-postgres
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-zeus}
      POSTGRES_USER: ${POSTGRES_USER:-zeus}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-zeus}
    ports:
      - "${POSTGRES_PORT:-55432}:5432"
    volumes:
      - postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-zeus} -d ${POSTGRES_DB:-zeus}"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7.4-alpine
    container_name: zeus-redis
    ports:
      - "${REDIS_PORT:-6379}:6379"
    volumes:
      - redis-data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  backend:
    build:
      context: ./backend
    container_name: zeus-backend
    environment:
      APP_NAME: Zeus API
      ENVIRONMENT: ${ENVIRONMENT:-development}
      DATABASE_URL: postgresql+asyncpg://${POSTGRES_USER:-zeus}:${POSTGRES_PASSWORD:-zeus}@postgres:5432/${POSTGRES_DB:-zeus}
      REDIS_URL: redis://redis:6379/0
      CORS_ORIGINS: ${CORS_ORIGINS:-http://localhost:3000}
      LLM_MODEL: ${LLM_MODEL:-}
      LLM_TIMEOUT_SECONDS: ${LLM_TIMEOUT_SECONDS:-120}
      OPENAI_API_KEY: ${OPENAI_API_KEY:-}
      OPENAI_BASE_URL: ${OPENAI_BASE_URL:-https://api.openai.com/v1}
      XAI_API_KEY: ${XAI_API_KEY:-}
      XAI_BASE_URL: ${XAI_BASE_URL:-https://api.x.ai/v1}
      ANTHROPIC_API_KEY: ${ANTHROPIC_API_KEY:-}
      ANTHROPIC_BASE_URL: ${ANTHROPIC_BASE_URL:-https://api.anthropic.com}
      DEEPSEEK_API_KEY: ${DEEPSEEK_API_KEY:-}
      DEEPSEEK_BASE_URL: ${DEEPSEEK_BASE_URL:-https://api.deepseek.com/v1}
      DATA_SOURCE_AKSHARE_ENABLED: ${DATA_SOURCE_AKSHARE_ENABLED:-false}
      DATA_SOURCE_AKSHARE_SYMBOLS: ${DATA_SOURCE_AKSHARE_SYMBOLS:-RB0,HC0,I0,J0,JM0,RU0,NR0,BR0,SC0,TA0,MA0,PP0,CU0,AL0,ZN0,NI0,M0,Y0,P0,AU0,AG0}
      DATA_SOURCE_AKSHARE_HISTORY_LIMIT: ${DATA_SOURCE_AKSHARE_HISTORY_LIMIT:-80}
      DATA_SOURCE_GDELT_ENABLED: ${DATA_SOURCE_GDELT_ENABLED:-false}
      DATA_SOURCE_GDELT_QUERY: ${DATA_SOURCE_GDELT_QUERY:-commodities futures OR supply chain OR inventory}
      DATA_SOURCE_OPEN_METEO_ENABLED: ${DATA_SOURCE_OPEN_METEO_ENABLED:-false}
      OPEN_METEO_BASE_URL: ${OPEN_METEO_BASE_URL:-https://api.open-meteo.com/v1/forecast}
      DATA_SOURCE_NASA_POWER_ENABLED: ${DATA_SOURCE_NASA_POWER_ENABLED:-false}
      NASA_POWER_BASE_URL: ${NASA_POWER_BASE_URL:-https://power.larc.nasa.gov/api/temporal/daily/point}
      DATA_SOURCE_NASA_POWER_BASELINE_ENABLED: ${DATA_SOURCE_NASA_POWER_BASELINE_ENABLED:-false}
      NASA_POWER_BASELINE_YEARS: ${NASA_POWER_BASELINE_YEARS:-5}
      NASA_POWER_BASELINE_WINDOW_DAYS: ${NASA_POWER_BASELINE_WINDOW_DAYS:-7}
      DATA_SOURCE_FRED_ENABLED: ${DATA_SOURCE_FRED_ENABLED:-false}
      FRED_API_KEY: ${FRED_API_KEY:-}
      FRED_BASE_URL: ${FRED_BASE_URL:-https://api.stlouisfed.org/fred}
      DATA_SOURCE_EIA_ENABLED: ${DATA_SOURCE_EIA_ENABLED:-false}
      EIA_API_KEY: ${EIA_API_KEY:-}
      EIA_BASE_URL: ${EIA_BASE_URL:-https://api.eia.gov}
      DATA_SOURCE_TUSHARE_ENABLED: ${DATA_SOURCE_TUSHARE_ENABLED:-false}
      TUSHARE_TOKEN: ${TUSHARE_TOKEN:-}
      TUSHARE_BASE_URL: ${TUSHARE_BASE_URL:-http://api.tushare.pro}
      DATA_SOURCE_TUSHARE_EXCHANGES: ${DATA_SOURCE_TUSHARE_EXCHANGES:-SHFE,DCE,CZCE,INE}
      DATA_SOURCE_TUSHARE_SYMBOLS: ${DATA_SOURCE_TUSHARE_SYMBOLS:-RB,HC,I,J,JM,RU,NR,BR,SC,TA,MA,PP,CU,AL,ZN,NI,M,Y,P,AU,AG}
    ports:
      - "${BACKEND_PORT:-8000}:8000"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    healthcheck:
      test:
        [
          "CMD",
          "python",
          "-c",
          "import urllib.request; urllib.request.urlopen('http://127.0.0.1:8000/api/health').read()",
        ]
      interval: 10s
      timeout: 5s
      retries: 5

  backend-test:
    profiles: ["test"]
    build:
      context: ./backend
      target: dev
    environment:
      APP_NAME: Zeus API
      ENVIRONMENT: test
      DATABASE_URL: postgresql+asyncpg://${POSTGRES_USER:-zeus}:${POSTGRES_PASSWORD:-zeus}@postgres:5432/${POSTGRES_DB:-zeus}
      REDIS_URL: redis://redis:6379/1
      CORS_ORIGINS: ${CORS_ORIGINS:-http://localhost:3000}
      PYTEST_ADDOPTS: -p no:cacheprovider
    volumes:
      - ./backend:/app
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    command: python -m pytest -q

  frontend:
    image: node:22-alpine
    container_name: zeus-frontend
    working_dir: /app
    command: sh -c "npm install && npm run dev"
    environment:
      BACKEND_INTERNAL_URL: http://backend:8000
      NEXT_PUBLIC_API_URL: ${NEXT_PUBLIC_API_URL:-http://localhost:8000}
    ports:
      - "${FRONTEND_PORT:-3000}:3000"
    volumes:
      - ./frontend:/app
      - frontend-node-modules:/app/node_modules
    depends_on:
      backend:
        condition: service_healthy

  weaviate:
    profiles: ["weaviate"]
    image: cr.weaviate.io/semitechnologies/weaviate:1.28.4
    container_name: zeus-weaviate
    ports:
      - "${WEAVIATE_PORT:-8080}:8080"
    environment:
      QUERY_DEFAULTS_LIMIT: 25
      AUTHENTICATION_ANONYMOUS_ACCESS_ENABLED: "true"
      PERSISTENCE_DATA_PATH: /var/lib/weaviate
      DEFAULT_VECTORIZER_MODULE: none
      CLUSTER_HOSTNAME: zeus-weaviate
    volumes:
      - weaviate-data:/var/lib/weaviate

volumes:
  postgres-data:
  redis-data:
  frontend-node-modules:
  weaviate-data:
